<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ead2a2"/>
      <stop offset="45%" stop-color="#f4e5bf"/>
      <stop offset="100%" stop-color="#c88b4c"/>
    </linearGradient>
    <radialGradient id="glow" cx="36%" cy="34%" r="60%">
      <stop offset="0%" stop-color="#fff9e6" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#f4deb2" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8f4e1f" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="paper-noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
    <filter id="soft-blur">
      <feGaussianBlur stdDeviation="1.3"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#paper)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>
  <rect width="1600" height="1000" filter="url(#paper-noise)" opacity="0.9"/>

  <g opacity="0.08" fill="#7b4f22" font-family="Georgia, serif" font-size="28">
    <text x="140" y="170">MONTE CARLO SAVINGS LEDGER</text>
    <text x="220" y="250">compound return notes and monthly deposits</text>
    <text x="180" y="330">bank reserves, probability, loss curve, terminal value</text>
    <text x="160" y="410">ledger folio no. 1887 - capital preservation record</text>
    <text x="260" y="490">expected return, volatility, drawdown, scenario path</text>
    <text x="210" y="570">portfolio study, percentile band, compounding horizon</text>
    <text x="130" y="650">capital study for disciplined accumulation</text>
    <text x="240" y="730">banking hall register and coin reserve memorandum</text>
  </g>

  <g opacity="0.1" stroke="#8d5a28" fill="none">
    <circle cx="250" cy="180" r="84" stroke-width="5"/>
    <circle cx="250" cy="180" r="60" stroke-width="2"/>
    <circle cx="1370" cy="220" r="92" stroke-width="5"/>
    <circle cx="1370" cy="220" r="64" stroke-width="2"/>
  </g>

  <g transform="translate(1080 540)" opacity="0.34">
    <ellipse cx="180" cy="320" rx="260" ry="64" fill="#825224" opacity="0.24"/>

    <g transform="translate(0 10)">
      <rect x="34" y="120" width="292" height="146" rx="6" fill="#d3a15d" opacity="0.6"/>
      <polygon points="16,126 178,24 340,126" fill="#9b642f" opacity="0.82"/>
      <rect x="58" y="86" width="244" height="24" fill="#b37b3b" opacity="0.78"/>
      <rect x="72" y="110" width="216" height="12" fill="#e4c38d" opacity="0.65"/>
      <rect x="66" y="138" width="30" height="114" fill="#8f5d2a"/>
      <rect x="118" y="138" width="30" height="114" fill="#8f5d2a"/>
      <rect x="170" y="138" width="30" height="114" fill="#8f5d2a"/>
      <rect x="222" y="138" width="30" height="114" fill="#8f5d2a"/>
      <rect x="274" y="138" width="30" height="114" fill="#8f5d2a"/>
      <rect x="20" y="262" width="302" height="22" fill="#73431d"/>
    </g>

    <g transform="translate(288 184)">
      <g opacity="0.92">
        <ellipse cx="46" cy="112" rx="44" ry="11" fill="#9a632d"/>
        <rect x="2" y="64" width="88" height="48" fill="#d2a357"/>
        <ellipse cx="46" cy="64" rx="44" ry="11" fill="#f1cb72"/>
        <ellipse cx="46" cy="88" rx="44" ry="11" fill="#e6ba62"/>
      </g>
      <g transform="translate(76 18)" opacity="0.88">
        <ellipse cx="40" cy="126" rx="38" ry="10" fill="#8e5928"/>
        <rect x="2" y="88" width="76" height="38" fill="#c39044"/>
        <ellipse cx="40" cy="88" rx="38" ry="10" fill="#e4bb64"/>
      </g>
      <g transform="translate(-58 34)" opacity="0.8">
        <ellipse cx="36" cy="132" rx="34" ry="9" fill="#8a5424"/>
        <rect x="2" y="102" width="68" height="30" fill="#b9873f"/>
        <ellipse cx="36" cy="102" rx="34" ry="9" fill="#dfb35a"/>
      </g>
    </g>
  </g>

  <g opacity="0.12" filter="url(#soft-blur)">
    <rect x="0" y="0" width="1600" height="50" fill="#5a2d12"/>
    <rect x="0" y="950" width="1600" height="50" fill="#5a2d12"/>
    <rect x="0" y="0" width="55" height="1000" fill="#633316"/>
    <rect x="1545" y="0" width="55" height="1000" fill="#633316"/>
  </g>
</svg>
